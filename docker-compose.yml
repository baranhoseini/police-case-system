services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: police_db
      POSTGRES_USER: police_user
      POSTGRES_PASSWORD: police_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    environment:
      DATABASE_URL: postgres://police_user:police_pass@db:5432/police_db
      DJANGO_DEBUG: "1"
      ALLOWED_HOSTS: "*"
      PAYMENT_GATEWAY: ${PAYMENT_GATEWAY:-mock}
      ZARINPAL_MERCHANT_ID: ${ZARINPAL_MERCHANT_ID:-""}
      ZARINPAL_SANDBOX: ${ZARINPAL_SANDBOX:-0}
      FRONTEND_PAYMENT_RETURN_URL: ${FRONTEND_PAYMENT_RETURN_URL:-http://localhost:5174/payment/return}
    ports:
      - "8000:8000"
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      VITE_API_BASE_URL: http://localhost:8000/api
    ports:
      - "5174:5174"
    depends_on:
      - backend
    command: sh -lc "npm install && npm run dev -- --host 0.0.0.0 --port 5174"

volumes:
  postgres_data: